  <body>
    <main class="container">
      <header class="header">
        <h1>JSON 整形・圧縮</h1>
        <p>JSON を見やすく整形、または圧縮します。文法エラーも表示します。</p>
      </header>

      <section class="panel">
        <div class="panel-head"><h2>入力</h2></div>
        <div class="panel-body">
          <textarea id="jsonInput" rows="8" placeholder='{"key":"value"} を貼り付け'></textarea>
        </div>
        <div class="tool-actions">
          <button id="jsonFormatBtn" type="button">整形</button>
          <button id="jsonMinifyBtn" type="button">圧縮</button>
          <button id="jsonClearBtn" type="button" class="secondary">クリア</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head"><h2>結果</h2></div>
        <div class="panel-body">
          <div class="textarea-wrap">
            <textarea id="jsonOutput" rows="8" readonly placeholder="変換結果がここに表示されます"></textarea>
            <button id="jsonCopyBtn" type="button" class="copy-icon" aria-label="結果をコピー" title="結果をコピー">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <rect x="9" y="9" width="11" height="11" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            </button>
          </div>
        </div>
      </section>

      <p id="jsonStatus" class="status" role="status" aria-live="polite"></p>

        <!-- END AADS AD UNIT 2448808 -->
      </aside>

      <section class="panel">
        <h2>使い方</h2>
        <p>
          JSON を貼り付けて「整形」を押すと、インデント付きで読みやすく表示します。「圧縮」は空白を除いた最小形（minify）に変換します。
          文法が正しくない場合はエラー箇所のメッセージを表示するので、簡易的な JSON バリデータとしても使えます。
          入力はサーバーに送信されず、ブラウザ内だけで処理されます。
        </p>
