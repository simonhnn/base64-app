      <section class="panel">
        <h2>URL エンコードとは</h2>
        <p>
          URL エンコード（パーセントエンコーディング）は、URL で使えない文字（日本語・空白・記号など）を
          <code>%</code> と16進数で表現する変換です。クエリ文字列やフォーム送信値を安全に扱うために使われます。
          このツールは <code>encodeURIComponent</code> / <code>decodeURIComponent</code> 相当の変換をブラウザ内で行い、
          入力内容をサーバーへ送信しません。
        </p>
