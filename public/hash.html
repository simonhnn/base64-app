  <body>
    <main class="container">
      <header class="header">
        <h1>ハッシュ生成（SHA）</h1>
        <p>テキストから SHA-256 などのハッシュ値をブラウザ内で計算します。</p>
      </header>

      <section class="panel">
        <div class="panel-head"><h2>入力</h2></div>
        <div class="panel-body">
          <textarea id="hashInput" rows="6" placeholder="ハッシュ化するテキストを入力"></textarea>
        </div>
        <div class="tool-actions">
          <label for="hashAlgo" class="sr-only">アルゴリズム</label>
          <select id="hashAlgo" aria-label="ハッシュアルゴリズム">
            <option value="SHA-256">SHA-256</option>
            <option value="SHA-1">SHA-1</option>
            <option value="SHA-384">SHA-384</option>
            <option value="SHA-512">SHA-512</option>
          </select>
          <button id="hashBtn" type="button">生成</button>
          <button id="hashClearBtn" type="button" class="secondary">クリア</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head"><h2>結果（16進）</h2></div>
        <div class="panel-body">
          <div class="textarea-wrap">
            <textarea id="hashOutput" rows="4" readonly placeholder="ハッシュ値がここに表示されます"></textarea>
            <button id="hashCopyBtn" type="button" class="copy-icon" aria-label="結果をコピー" title="結果をコピー">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <rect x="9" y="9" width="11" height="11" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            </button>
          </div>
        </div>
      </section>

      <p id="hashStatus" class="status" role="status" aria-live="polite"></p>

      <aside class="ad-slot" aria-label="広告">
        <!-- BEGIN AADS AD UNIT 2448808 -->

        </div>
        <!-- END AADS AD UNIT 2448808 -->
      </aside>

      <section class="panel">
        <h2>ハッシュとは</h2>
        <p>
          ハッシュ関数は、任意の長さのデータを固定長の値へ変換する一方向の計算です。ファイルの整合性チェックや
          データの指紋（フィンガープリント）に使われます。本ツールはブラウザ標準の Web Crypto API を用いて
          SHA-256・SHA-1・SHA-384・SHA-512 を計算します（MD5 には非対応）。入力はサーバーへ送信されません。
        </p>
      </section>
