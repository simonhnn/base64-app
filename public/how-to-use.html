  <body>
    <main class="container">
      <header class="header">
        <h1>使い方</h1>
        <p>テキストと Base64 をすぐに相互変換できます。</p>
      </header>

      <section class="panel">
        <h2>基本操作</h2>
        <ol>
          <li>上段（Base64）または下段（平文）のどちらかに文字列を入力します。</li>
          <li>中央の「変換」ボタンを押します。</li>
          <li>入力した側に応じて、もう片方の欄に変換結果が表示されます。</li>
          <li>各入力欄の右下にあるコピーアイコンで結果をコピーできます。不要になったら「クリア」で消去します。</li>
        </ol>
      </section>

      <section class="panel">
        <h2>注意点</h2>
        <ul>
          <li>入力上限は 10,000 文字です。</li>
          <li>デコード時に形式が不正な場合、エラーを表示します。</li>
          <li>変換処理はブラウザ内で実行されます。</li>
        </ul>
      </section>
