    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="使い方 | Base64 変換ツール" />

  <body>
    <main class="container">
      <header class="header">
        <h1>使い方</h1>
        <p>テキストと Base64 をすぐに相互変換できます。</p>
      </header>

      <section class="panel">
        <h2>基本操作</h2>
        <ol>
          <li>上段（Base64）または下段（平文）のどちらかに文字列を入力します。</li>
          <li>中央の「変換」ボタンを押します。</li>
          <li>入力した側に応じて、もう片方の欄に変換結果が表示されます。</li>
          <li>必要に応じて「コピー」「貼り付け」「クリア」を使います。</li>
        </ol>
      </section>

      <section class="panel">
        <h2>注意点</h2>
        <ul>
          <li>入力上限は 10,000 文字です。</li>
          <li>デコード時に形式が不正な場合、エラーを表示します。</li>
          <li>変換処理はブラウザ内で実行されます。</li>
        </ul>
      </section>

      <footer class="footer-links">
        <a href="/">トップへ戻る</a>
        <a href="/privacy.html">プライバシーポリシー</a>
      </footer>
    </main>
  </body>
